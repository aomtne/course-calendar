name: Update Course Calendar

# Trigger: when any .xlsx file in data/ folder is added or updated
on:
  push:
    paths:
      - 'data/**.xlsx'

# Allow the workflow to commit changes back to the repo
permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run generate script
        run: python scripts/generate.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update calendar from Excel data"
          git push
